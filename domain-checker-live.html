<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Checker — Live DNS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;font-family:'Outfit',sans-serif;color:#fff;min-height:100vh;padding:28px 16px}
h1{font-size:10px;letter-spacing:3px;color:#2a2a45;text-transform:uppercase;text-align:center;margin-bottom:5px}
h2{font-size:22px;font-weight:800;text-align:center;background:linear-gradient(135deg,#00e676,#00bcd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px}
.sub{font-size:11px;color:#2a2a45;text-align:center;margin-bottom:22px;line-height:1.8}

.controls{max-width:580px;margin:0 auto 18px;display:flex;flex-direction:column;gap:8px}
.row{display:flex;gap:8px}
input[type=text]{flex:1;background:#0f0f1e;border:1px solid #1a1a30;border-radius:10px;color:#fff;font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 14px;outline:none;transition:border-color 0.15s}
input[type=text]:focus{border-color:#00e67644}
input[type=text]::placeholder{color:#222238;font-family:'Outfit',sans-serif}
.btn{background:linear-gradient(135deg,#00e676,#00bcd4);border:none;border-radius:10px;color:#000;font-weight:700;font-size:12px;font-family:'Outfit',sans-serif;padding:11px 18px;cursor:pointer;white-space:nowrap;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.35;cursor:default}
.btn.stop{background:#ff444418;border:1px solid #ff444430;color:#ff4444}
.tld-row{display:flex;gap:5px;flex-wrap:wrap}
.tld-btn{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:500;border:1px solid #1a1a30;background:transparent;color:#2a2a45;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.1s}
.tld-btn.on{background:#00e67615;border-color:#00e67635;color:#00e676}

/* Progress */
.progress-bar{max-width:580px;margin:0 auto 8px;height:3px;background:#111120;border-radius:2px;overflow:hidden;display:none}
.progress-fill{height:100%;background:linear-gradient(90deg,#00e676,#00bcd4);border-radius:2px;transition:width 0.3s ease;width:0%}
.status{max-width:580px;margin:0 auto 10px;font-size:10px;color:#2a2a45;font-family:'JetBrains Mono',monospace;text-align:center;min-height:16px}

/* Stats bar */
.stats{max-width:580px;margin:0 auto 12px;display:flex;gap:8px;display:none}
.stat{flex:1;background:#0f0f1e;border:1px solid #1a1a30;border-radius:8px;padding:7px 10px;text-align:center}
.stat-num{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:9px;color:#2a2a45;letter-spacing:1px;margin-top:2px}

/* Results */
.results{max-width:580px;margin:0 auto;display:flex;flex-direction:column;gap:4px}
.domain-card{background:#0f0f1e;border:1px solid #1a1a30;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;animation:fi 0.15s ease forwards;opacity:0}
@keyframes fi{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
.domain-card.avail{border-color:#00e67630;background:#071410}
.domain-card.taken{opacity:0.35}
.domain-card.checking{border-color:#ffffff10}

.dname{flex:1;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.dname .ext{font-weight:400}
.avail .dname{color:#00e676}
.avail .dname .ext{color:#00e67699}
.taken .dname{color:#333355}
.checking .dname{color:#333355}

.status-badge{font-size:9px;padding:3px 8px;border-radius:6px;font-weight:600;letter-spacing:0.5px;flex-shrink:0;min-width:70px;text-align:center}
.s-avail{background:#00e67620;color:#00e676;border:1px solid #00e67635}
.s-taken{background:#ffffff08;color:#222240;border:1px solid #1a1a30}
.s-checking{background:#ffffff08;color:#222240;border:1px solid #1a1a30}
.s-error{background:#ff444415;color:#ff4444;border:1px solid #ff444425}

.links{display:flex;gap:3px;flex-shrink:0}
.lbtn{padding:5px 8px;border-radius:6px;font-size:10px;font-weight:600;font-family:'Outfit',sans-serif;text-decoration:none;border:1px solid #1a1a30;color:#2a2a45;transition:all 0.1s;white-space:nowrap}
.avail .lbtn{border-color:#00e67630;color:#00e676}
.avail .lbtn:hover{background:#00e67618}
.cpbtn{background:transparent;border:1px solid #1a1a30;border-radius:6px;color:#2a2a45;padding:5px 8px;cursor:pointer;font-size:11px;transition:all 0.1s}
.avail .cpbtn{border-color:#00e67630;color:#00e67699}
.cpbtn.ok{color:#00e676}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{display:inline-block;width:10px;height:10px;border:1.5px solid #1a1a30;border-top-color:#00e676;border-radius:50%;animation:spin 0.6s linear infinite}

.empty{text-align:center;padding:40px 20px;color:#1a1a28;font-size:12px;line-height:2.5}
.section-head{font-size:9px;letter-spacing:2px;color:#1a1a28;text-transform:uppercase;max-width:580px;margin:12px auto 5px;padding-left:2px}
</style>
</head>
<body>

<h1>Domain Checker · Live DNS</h1>
<h2>Real Availability Check</h2>
<div class="sub">
  Checks actual DNS — NXDOMAIN = 🟢 Available<br>
  <span style="color:#1a1a28">Enter names one per line, or use the generator below</span>
</div>

<div class="controls">
  <div class="row">
    <input type="text" id="bulkInput" placeholder="Type names: edgr, travio, sgnlr, quavix... (comma or newline separated)" />
    <button class="btn" id="checkBtn" onclick="startCheck()">Check DNS ⚡</button>
  </div>
  <div class="tld-row" id="tldRow"></div>

  <!-- Generator strip -->
  <div class="row" style="margin-top:4px">
    <input type="text" id="genKw" placeholder="Auto-generate from keyword (ex: signal, trade, edge)" style="font-size:12px"/>
    <button class="btn" onclick="autoGenerate()" style="background:#111120;border:1px solid #1a1a30;color:#444466;font-size:11px">Generate names →</button>
  </div>
</div>

<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
<div class="status" id="statusText"></div>

<div class="stats" id="statsBar">
  <div class="stat"><div class="stat-num" id="statAvail" style="color:#00e676">0</div><div class="stat-label">AVAILABLE</div></div>
  <div class="stat"><div class="stat-num" id="statTaken" style="color:#333355">0</div><div class="stat-label">TAKEN</div></div>
  <div class="stat"><div class="stat-num" id="statTotal" style="color:#555577">0</div><div class="stat-label">CHECKED</div></div>
</div>

<div id="availSection" style="display:none"><div class="section-head">🟢 Available</div></div>
<div id="takenSection" style="display:none"><div class="section-head">✗ Taken</div></div>

<div id="availResults" class="results" style="margin-bottom:6px"></div>
<div id="takenResults" class="results"></div>

<script>
// ── TLD CONFIG ──────────────────────────────────────────────
const TLDS = ['.com','.io','.app','.co','.ai','.xyz','.gg','.pro','.net','.dev'];
const active = new Set(['.com','.io','.app']);

const tldRow = document.getElementById('tldRow');
TLDS.forEach(t => {
  const b = document.createElement('button');
  b.className = 'tld-btn'+(active.has(t)?' on':'');
  b.textContent = t;
  b.onclick = () => {
    active.has(t)?active.delete(t):active.add(t);
    b.className = 'tld-btn'+(active.has(t)?' on':'');
  };
  tldRow.appendChild(b);
});

// ── DNS CHECK via Cloudflare DoH ────────────────────────────
async function checkDNS(domain) {
  try {
    const res = await fetch(
      `https://cloudflare-dns.com/dns-query?name=${domain}&type=A`,
      { headers: { Accept: 'application/dns-json' } }
    );
    const data = await res.json();
    // Status 3 = NXDOMAIN = domain doesn't exist = AVAILABLE
    // Status 0 = NOERROR = domain exists = TAKEN
    if(data.Status === 3) return 'available';
    if(data.Status === 0) {
      // Check if there are actual records
      if(!data.Answer || data.Answer.length === 0) return 'available';
      return 'taken';
    }
    return 'taken'; // safe default
  } catch(e) {
    return 'error';
  }
}

// ── GENERATOR ───────────────────────────────────────────────
function generateNames(kw) {
  const k = kw.toLowerCase().replace(/[^a-z]/g,'');
  const names = new Set();

  const endings = ['r','x','z','vy','fy','ly','iq','io','ax','ex','ix','on','in','ux','zy'];
  const prefixes = ['ve','ze','ka','ro','mo','lo','ko','vi','zi','li','ki','fi'];

  // Truncate + ending
  for(let i=2;i<=Math.min(k.length,5);i++){
    endings.forEach(e => {
      const n = k.slice(0,i)+e;
      if(n.length>=4&&n.length<=8) names.add(n);
    });
  }
  // Prefix + truncate
  prefixes.forEach(p => {
    for(let i=2;i<=Math.min(k.length,5);i++){
      const n = p+k.slice(0,i);
      if(n.length>=4&&n.length<=8) names.add(n);
    }
  });
  // Vowel drop
  const vd = k.replace(/[aeiou]/g,'');
  if(vd.length>=3) {
    endings.forEach(e => {
      const n = vd+e;
      if(n.length>=4&&n.length<=8) names.add(n);
    });
    names.add(vd);
  }
  // Direct mutations
  names.add(k+'r');names.add(k+'x');names.add(k+'z');names.add(k+'iq');
  const stripped = k.replace(/[aeiou]+\$/,'');
  if(stripped!==k){names.add(stripped+'r');names.add(stripped+'x')}

  return [...names].filter(n=>n!==k&&n.length>=3&&n.length<=10);
}

function autoGenerate() {
  const kw = document.getElementById('genKw').value.trim();
  if(!kw) return;
  const names = generateNames(kw);
  document.getElementById('bulkInput').value = names.slice(0,30).join(', ');
}

// ── MAIN CHECK FLOW ─────────────────────────────────────────
let running = false;
let stopFlag = false;
let availCount = 0;
let takenCount = 0;
let totalCount = 0;

function updateStats() {
  document.getElementById('statAvail').textContent = availCount;
  document.getElementById('statTaken').textContent = takenCount;
  document.getElementById('statTotal').textContent = totalCount;
}

async function startCheck() {
  if(running){ stopFlag=true; return; }

  const raw = document.getElementById('bulkInput').value;
  if(!raw.trim()) return;

  // Parse names
  const names = raw.split(/[\n,;]+/).map(s=>s.trim().toLowerCase().replace(/[^a-z0-9]/g,'')).filter(s=>s.length>=2&&s.length<=20);
  if(!names.length) return;

  const tlds = [...active];
  const domains = [];
  names.forEach(n => tlds.forEach(t => domains.push({name:n, tld:t, domain:n+t})));

  // Reset
  running = true; stopFlag = false;
  availCount = 0; takenCount = 0; totalCount = 0;
  document.getElementById('availResults').innerHTML = '';
  document.getElementById('takenResults').innerHTML = '';
  document.getElementById('availSection').style.display='none';
  document.getElementById('takenSection').style.display='none';
  document.getElementById('progressBar').style.display='block';
  document.getElementById('statsBar').style.display='flex';
  updateStats();

  const btn = document.getElementById('checkBtn');
  btn.className = 'btn stop';
  btn.textContent = '⛔ Stop';

  let checked = 0;

  for(const d of domains) {
    if(stopFlag) break;

    document.getElementById('statusText').textContent = `Checking ${d.domain}...`;
    document.getElementById('progressFill').style.width = `${(checked/domains.length)*100}%`;

    const result = await checkDNS(d.domain);
    checked++; totalCount++;

    if(result === 'available') {
      availCount++;
      document.getElementById('availSection').style.display='block';
      addCard(d, 'available', document.getElementById('availResults'), checked);
    } else {
      takenCount++;
      if(takenCount <= 20) { // show max 20 taken to keep UI clean
        document.getElementById('takenSection').style.display='block';
        addCard(d, 'taken', document.getElementById('takenResults'), checked);
      }
    }

    updateStats();

    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 120));
  }

  running = false;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('statusText').textContent = stopFlag
    ? `Stopped · ${availCount} available found`
    : `Done · ${availCount} available out of ${totalCount} checked`;
  btn.className = 'btn';
  btn.textContent = 'Check DNS ⚡';
}

function addCard(d, result, container, idx) {
  const isAvail = result === 'available';
  const card = document.createElement('div');
  card.className = `domain-card ${result}`;
  card.style.animationDelay = `${Math.min(idx,20)*0.02}s`;

  const badge = isAvail
    ? `<div class="status-badge s-avail">🟢 AVAILABLE</div>`
    : `<div class="status-badge s-taken">✗ taken</div>`;

  const links = isAvail ? `
    <div class="links">
      <a href="https://porkbun.com/checkout/search?q=${d.domain}" target="_blank" class="lbtn">Porkbun</a>
      <a href="https://www.namecheap.com/domains/registration/results/?domain=${d.domain}" target="_blank" class="lbtn">NC</a>
    </div>
    <button class="cpbtn" onclick="cp(this,'${d.domain}')">⎘</button>
  ` : '';

  card.innerHTML = `
    <div class="dname">${d.name}<span class="ext">${d.tld}</span></div>
    ${badge}
    ${links}
  `;
  container.appendChild(card);
}

function cp(btn, domain) {
  navigator.clipboard.writeText(domain);
  btn.textContent='✓';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='⎘';btn.classList.remove('ok')},1500);
}

document.getElementById('bulkInput').addEventListener('keydown', e => {
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)) startCheck();
});
</script>
</body>
</html>
