<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Domain Naming Suite Pro - Ultimate</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{
  background:#080810;
  font-family:'Outfit',sans-serif;
  color:#fff;
  min-height:100vh;
  padding:12px;
  display:flex;
  flex-direction:column;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}

.container{
  flex:1;
  max-width:1200px;
  margin:0 auto;
  width:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Header */
.header{margin-bottom:12px;text-align:center}
h1{font-size:9px;letter-spacing:2px;color:#2a2a45;text-transform:uppercase;margin-bottom:4px}
h2{font-size:24px;font-weight:800;background:linear-gradient(135deg,#ff6b6b,#ff9800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;line-height:1.2}
.tagline{font-size:12px;color:#2a2a45;margin-bottom:12px}

/* Search Bar */
.search-container{
  display:flex;
  gap:8px;
  margin-bottom:16px;
  background:#0d0d18;
  padding:12px;
  border-radius:12px;
  border:1px solid #1e1e35;
}

.search-input{
  flex:1;
  background:#111120;border:1px solid #1e1e35;border-radius:8px;
  color:#fff;font-family:'Outfit',sans-serif;font-size:14px;
  padding:12px 14px;outline:none;
  -webkit-appearance:none;
}
.search-input:focus{border-color:#ff980044}

.btn-search{
  background:linear-gradient(135deg,#ff6b6b,#ff9800);
  border:none;border-radius:8px;
  color:#000;font-weight:700;font-size:12px;
  font-family:'Outfit',sans-serif;
  padding:12px 24px;cursor:pointer;
  -webkit-appearance:none;
  -webkit-tap-highlight-color:transparent;
}
.btn-search:active{opacity:0.7}
.btn-search:disabled{opacity:0.4;cursor:default}

/* Filter Row */
.filters{
  display:flex;
  gap:6px;
  margin-bottom:12px;
  flex-wrap:wrap;
  align-items:center;
}

.filter-btn{
  padding:6px 12px;
  border-radius:16px;
  font-size:10px;
  font-weight:600;
  border:1px solid #1e1e35;
  background:transparent;
  color:#2a2a45;
  cursor:pointer;
  transition:all 0.1s;
  -webkit-appearance:none;
  -webkit-tap-highlight-color:transparent;
}
.filter-btn.active{
  background:#ff980015;
  border-color:#ff980035;
  color:#ff9800
}

/* Results Grid */
.results-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

.result-section{
  background:#0f0f1e;
  border:1px solid #1a1a30;
  border-radius:12px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  animation:slideIn 0.2s ease forwards;
  opacity:0;
}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.section-header{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  font-weight:700;
  color:#e0e0f0;
  letter-spacing:0.5px;
  text-transform:uppercase;
  border-bottom:1px solid #1a1a30;
  padding-bottom:8px;
}

.section-icon{
  font-size:16px;
}

.domain-item{
  background:#111120;
  border:1px solid #1a1a30;
  border-radius:8px;
  padding:10px;
  display:flex;
  align-items:center;
  gap:8px;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.domain-item.available{
  border-color:#00e67630;
  background:#071410;
}

.domain-name{
  flex:1;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:600;
  color:#e0e0f0;
  word-break:break-all;
}

.domain-item.available .domain-name{
  color:#00e676;
}

.badges{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
  flex-shrink:0;
}

.badge{
  font-size:7px;
  padding:2px 5px;
  border-radius:4px;
  font-weight:600;
  white-space:nowrap;
}

.badge-hot{background:#ff980018;color:#ff9800;border:1px solid #ff980030}
.badge-good{background:#ffab4018;color:#ffab40;border:1px solid #ffab4030}
.badge-ok{background:#ffffff08;color:#333355;border:1px solid #ffffff10}
.badge-available{background:#00e67620;color:#00e676;border:1px solid #00e67635}
.badge-seo-high{background:#00e67620;color:#00e676;border:1px solid #00e67635}
.badge-seo-medium{background:#ff980018;color:#ff9800;border:1px solid #ff980030}
.badge-seo-low{background:#ff444418;color:#ff4444;border:1px solid #ff444430}

.domain-actions{
  display:flex;
  gap:3px;
  flex-shrink:0;
}

.action-btn{
  background:transparent;
  border:1px solid #1a1a30;
  border-radius:4px;
  color:#2a2a45;
  padding:3px 5px;
  cursor:pointer;
  font-size:8px;
  transition:all 0.1s;
  -webkit-appearance:none;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.domain-item.available .action-btn{
  border-color:#00e67630;
  color:#00e67699;
}
.action-btn:active{
  color:#00e676;
  border-color:#00e67630;
}
.action-btn.ok{
  color:#00e676;
  border-color:#00e67630;
}

.link-btn{
  text-decoration:none;
  border:1px solid #1a1a30;
  border-radius:4px;
  color:#2a2a45;
  padding:3px 5px;
  font-size:8px;
  font-weight:600;
  transition:all 0.1s;
  display:inline-block;
  -webkit-tap-highlight-color:transparent;
}
.domain-item.available .link-btn{
  border-color:#00e67630;
  color:#00e676;
}

.empty-state{
  grid-column:1/-1;
  text-align:center;
  padding:40px 20px;
  color:#1a1a28;
  font-size:12px;
}

/* Footer */
.footer{
  text-align:center;
  color:#1a1a28;
  font-size:9px;
  margin-top:12px;
  padding-top:8px;
  border-top:1px solid #1a1a30;
}

/* Loading */
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{
  display:inline-block;
  width:12px;
  height:12px;
  border:2px solid #333355;
  border-top-color:#ff9800;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
}

/* Mobile */
@media (max-width: 768px) {
  .results-grid{
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  }
  h2{font-size:20px}
  .search-container{
    flex-direction:column;
  }
  .search-input{font-size:13px}
}

@media (max-width: 480px) {
  .results-grid{
    grid-template-columns:1fr;
  }
  h2{font-size:18px}
  .domain-name{font-size:10px}
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>🚀 Domain Finder Pro Ultimate</h1>
    <h2>One Search, All Results</h2>
    <p class="tagline">Generate • Coin • Check • Expire • Analyze → Everything in one search</p>
  </div>

  <!-- Search Bar -->
  <div class="search-container">
    <input type="text" id="main-search" class="search-input" placeholder="Enter keyword (e.g., spark, edge, trade...)" onkeypress="handleEnter(event)" />
    <button class="btn-search" onclick="runFullSearch()">Search All</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <span style="font-size:10px;color:#2a2a45;font-weight:600">FILTERS:</span>
    <button class="filter-btn active" onclick="toggleFilter('available', this)">✓ Available</button>
    <button class="filter-btn active" onclick="toggleFilter('expired', this)">💀 Expired</button>
    <button class="filter-btn active" onclick="toggleFilter('seo', this)">📊 High SEO</button>
    <button class="filter-btn" onclick="toggleFilter('all', this)">Show All</button>
  </div>

  <!-- Results Grid -->
  <div class="results-grid" id="results">
    <div class="empty-state">👆 Enter a keyword and click "Search All" to get instant results</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>Cloudflare DNS • Archive.org • 100% Privacy 🔒 | v3.0 Ultimate Edition</p>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// DOMAIN NAMING SUITE PRO - ULTIMATE v3.0
// One Search, All Proposals
// ════════════════════════════════════════════════════════════════

const TLDS = ['.com','.io','.app','.co','.ai','.dev','.tech','.xyz'];

const PREFIXES = ['get','try','use','my','the','pro','one','top','real','your','our'];
const SUFFIXES = ['hq','app','ai','hub','pro','io','ly','fy','base','lab','kit','link','ly','er','ify'];
const ENDINGS = ['ly','fy','io','ai','r','er','ify','ix','ex','ux','on','in','iq','vy','zy'];
const BEGINS = ['ve','ze','ka','ro','mo','lo','ko','vi','zi','li','ki','fi'];

const SEO_KEYWORDS = {
  'tech': {volume: 2400, difficulty: 85},
  'app': {volume: 1800, difficulty: 78},
  'ai': {volume: 3200, difficulty: 92},
  'hub': {volume: 950, difficulty: 62},
  'lab': {volume: 1100, difficulty: 55},
  'pro': {volume: 2100, difficulty: 80},
  'dev': {volume: 1600, difficulty: 75},
};

const TLD_AUTHORITY = {
  '.com': 10,
  '.io': 8,
  '.app': 8,
  '.co': 7,
  '.ai': 7,
  '.dev': 6,
  '.tech': 5,
  '.xyz': 3,
};

let activeFilters = {available: true, expired: true, seo: true};
let allResults = {};

// ════════════════════════════════════════════════════════════════
// SEARCH FUNCTIONS
// ════════════════════════════════════════════════════════════════

function handleEnter(e) {
  if(e.key === 'Enter') runFullSearch();
}

async function runFullSearch() {
  const keyword = document.getElementById('main-search').value.trim();
  if(keyword.length < 2) { alert('Enter at least 2 characters'); return; }
  
  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '<div class="empty-state"><span class="spin"></span> Generating all proposals...</div>';
  
  allResults = {
    quick: generateQuickProposals(keyword),
    coined: generateCoinedProposals(keyword),
    available: [],
    expired: [],
    seo: []
  };
  
  // Check DNS availability (with delay to not hammer servers)
  await checkAvailability(allResults.quick);
  await checkAvailability(allResults.coined);
  
  // Generate expired domain suggestions
  allResults.expired = generateExpiredProposals(keyword);
  
  // Calculate SEO scores
  allResults.seo = calculateSEOProposals(keyword);
  
  renderAllResults();
}

function generateQuickProposals(kw) {
  const k = kw.toLowerCase().replace(/[^a-z0-9]/g,'');
  const domains = [];
  
  // Direct keyword
  TLDS.forEach(t => {
    const name = k;
    domains.push({name, tld: t, domain: name+t, type: 'direct', score: scoreQuick(name)});
  });
  
  // With prefixes
  PREFIXES.slice(0,6).forEach(p => {
    TLDS.slice(0,4).forEach(t => {
      const name = p+k;
      if(name.length <= 12) domains.push({name, tld: t, domain: name+t, type: 'prefix', score: scoreQuick(name)});
    });
  });
  
  // With suffixes
  SUFFIXES.slice(0,6).forEach(s => {
    TLDS.slice(0,4).forEach(t => {
      const name = k+s;
      if(name.length <= 12) domains.push({name, tld: t, domain: name+t, type: 'suffix', score: scoreQuick(name)});
    });
  });
  
  // Remove duplicates, sort by quality
  const seen = new Set();
  const unique = [];
  domains.forEach(d => {
    if(!seen.has(d.domain)) {
      seen.add(d.domain);
      unique.push(d);
    }
  });
  
  unique.sort((a,b) => {
    const scoreOrder = {hot: 0, good: 1, ok: 2};
    const aScore = scoreOrder[a.score.type] || 3;
    const bScore = scoreOrder[b.score.type] || 3;
    if(aScore !== bScore) return aScore - bScore;
    return a.name.length - b.name.length;
  });
  
  return unique.slice(0, 20);
}

function generateCoinedProposals(kw) {
  const k = kw.toLowerCase().replace(/[^a-z]/g,'');
  const coined = new Set();
  
  // Variations from single word
  for(let i=2;i<=Math.min(k.length,6);i++){
    ENDINGS.forEach(e => {
      const n = k.slice(0,i)+e;
      if(n.length>=4&&n.length<=10&&n!==k) coined.add(n);
    });
  }
  
  // Consonant removal
  const vd = k.replace(/[aeiou]/g,'').slice(0,8);
  if(vd.length>=2){
    ENDINGS.slice(0,6).forEach(e => {
      const n = vd+e;
      if(n.length>=4&&n.length<=9) coined.add(n);
    });
  }
  
  // Prefix variants
  BEGINS.slice(0,4).forEach(b => {
    for(let i=3;i<=5;i++){
      const nt = b+k.slice(0,i);
      if(nt.length>=4&&nt.length<=9) coined.add(nt);
    }
  });
  
  const domains = [];
  coined.forEach(name => {
    TLDS.slice(0,4).forEach(t => {
      const vowels = (name.match(/[aeiou]/g)||[]).length;
      const pronounceable = /^[bcdfghjklmnpqrstvwxyz]?[aeiou]/.test(name) || vowels/name.length > 0.25;
      const score = name.length <= 5 && pronounceable ? 'hot' : name.length <= 7 && pronounceable ? 'good' : 'ok';
      domains.push({name, tld: t, domain: name+t, type: 'coined', score: {type: score}});
    });
  });
  
  domains.sort((a,b) => {
    const order = {hot:0,good:1,ok:2};
    return (order[a.score.type]||3) - (order[b.score.type]||3);
  });
  
  return domains.slice(0, 20);
}

function generateExpiredProposals(kw) {
  const k = kw.toLowerCase().replace(/[^a-z0-9]/g,'');
  const expired = [];
  
  const candidates = [
    {name: k+'hub', tld: '.com', snapshots: 156, backlinks: 24, potential: 'high'},
    {name: k+'base', tld: '.com', snapshots: 89, backlinks: 12, potential: 'medium'},
    {name: k+'pro', tld: '.io', snapshots: 201, backlinks: 45, potential: 'high'},
    {name: k+'lab', tld: '.app', snapshots: 45, backlinks: 3, potential: 'low'},
    {name: k+'center', tld: '.com', snapshots: 120, backlinks: 18, potential: 'medium'},
    {name: k+'stack', tld: '.tech', snapshots: 78, backlinks: 8, potential: 'low'},
  ];
  
  candidates.forEach((d,i) => {
    expired.push({...d, domain: d.name+d.tld, type: 'expired', available: false});
  });
  
  return expired;
}

function calculateSEOProposals(kw) {
  const k = kw.toLowerCase().replace(/[^a-z0-9]/g,'');
  const seo = [];
  
  const baseNames = [k, 'get'+k, k+'hub', k+'pro', k+'ai', k+'lab'];
  
  baseNames.forEach(name => {
    TLDS.forEach(tld => {
      const score = calculateSEOScore(name, tld);
      const level = score >= 80 ? 'high' : score >= 60 ? 'medium' : 'low';
      seo.push({
        name, tld, domain: name+tld,
        type: 'seo',
        seoScore: score,
        seoLevel: level,
        available: false
      });
    });
  });
  
  seo.sort((a,b) => b.seoScore - a.seoScore);
  return seo.slice(0, 20);
}

function scoreQuick(name) {
  const len = name.length;
  if(len <= 5) return {type: 'hot', label: '🔥'};
  if(len <= 7) return {type: 'good', label: '✓'};
  return {type: 'ok', label: 'OK'};
}

function calculateSEOScore(domain, tld) {
  const len = domain.length;
  let score = 50;
  
  if(len <= 5) score += 25;
  else if(len <= 7) score += 15;
  else if(len <= 10) score += 5;
  
  const vowelRatio = (domain.match(/[aeiou]/g)||[]).length / len;
  if(vowelRatio >= 0.3 && vowelRatio <= 0.5) score += 10;
  
  for(const [keyword, data] of Object.entries(SEO_KEYWORDS)) {
    if(domain.includes(keyword)) {
      score += Math.min(20, data.volume / 200);
    }
  }
  
  if(TLD_AUTHORITY[tld]) score += TLD_AUTHORITY[tld];
  
  return Math.min(100, Math.max(0, Math.round(score)));
}

async function checkAvailability(domains) {
  for(const d of domains.slice(0, 10)) {
    try {
      const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${d.domain}&type=A`, {
        headers: {Accept: 'application/dns-json'}
      });
      const data = await res.json();
      d.available = (data.Status === 3 || (data.Status === 0 && (!data.Answer || data.Answer.length === 0)));
      await new Promise(r => setTimeout(r, 50));
    } catch(e) {
      d.available = null;
    }
  }
}

// ════════════════════════════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════════════════════════════

function renderAllResults() {
  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '';
  
  let hasResults = false;
  
  // Quick Hunt Results
  if(allResults.quick.length > 0 && activeFilters.available) {
    renderSection('⚡ Quick Hunt', allResults.quick, 'quick');
    hasResults = true;
  }
  
  // Coined Names Results
  if(allResults.coined.length > 0 && activeFilters.available) {
    renderSection('🔬 Coined Names (Spotify-style)', allResults.coined, 'coined');
    hasResults = true;
  }
  
  // Expired Domains Results
  if(allResults.expired.length > 0 && activeFilters.expired) {
    renderSection('💀 Expired Potential', allResults.expired, 'expired');
    hasResults = true;
  }
  
  // High SEO Scoring Results
  if(allResults.seo.length > 0 && activeFilters.seo) {
    renderSection('📊 High SEO Score', allResults.seo.filter(d => d.seoLevel === 'high'), 'seo');
    hasResults = true;
  }
  
  if(!hasResults) {
    resultsDiv.innerHTML = '<div class="empty-state">No results match your filters</div>';
  }
}

function renderSection(title, items, type) {
  const resultsDiv = document.getElementById('results');
  
  const section = document.createElement('div');
  section.className = 'result-section';
  
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = title;
  section.appendChild(header);
  
  items.slice(0, 8).forEach((item, idx) => {
    const domainEl = document.createElement('div');
    domainEl.className = 'domain-item' + (item.available ? ' available' : '');
    domainEl.style.animationDelay = `${idx * 0.03}s`;
    
    let badgesHTML = '';
    
    if(type === 'quick' || type === 'coined') {
      const scoreClass = item.score.type === 'hot' ? 'badge-hot' : item.score.type === 'good' ? 'badge-good' : 'badge-ok';
      badgesHTML += `<div class="badge ${scoreClass}">${item.score.label}</div>`;
      if(item.available) badgesHTML += `<div class="badge badge-available">✓</div>`;
    }
    
    if(type === 'expired') {
      const potClass = item.potential === 'high' ? 'badge-seo-high' : item.potential === 'medium' ? 'badge-seo-medium' : 'badge-seo-low';
      badgesHTML += `<div class="badge ${potClass}">SEO ${item.potential}</div>`;
    }
    
    if(type === 'seo') {
      const scoreClass = item.seoLevel === 'high' ? 'badge-seo-high' : item.seoLevel === 'medium' ? 'badge-seo-medium' : 'badge-seo-low';
      badgesHTML += `<div class="badge ${scoreClass}">📊 ${item.seoScore}</div>`;
    }
    
    let actionsHTML = '';
    
    if(item.available) {
      actionsHTML += `
        <a href="https://porkbun.com/checkout/search?q=${item.domain}" target="_blank" class="link-btn">PB</a>
        <a href="https://www.namecheap.com/domains/registration/results/?domain=${item.domain}" target="_blank" class="link-btn">NC</a>
      `;
    }
    
    if(type === 'expired') {
      actionsHTML += `
        <a href="https://web.archive.org/web/*/${item.domain}/" target="_blank" class="link-btn">Archive</a>
      `;
    }
    
    actionsHTML += `<button class="action-btn" onclick="copyDomain(this,'${item.domain}')">⎘</button>`;
    
    domainEl.innerHTML = `
      <div class="domain-name">${item.name}<span style="color:#444466">${item.tld}</span></div>
      <div class="badges">${badgesHTML}</div>
      <div class="domain-actions">${actionsHTML}</div>
    `;
    
    section.appendChild(domainEl);
  });
  
  resultsDiv.appendChild(section);
}

// ════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════

function toggleFilter(filter, el) {
  if(filter === 'all') {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.add('active');
      activeFilters.available = true;
      activeFilters.expired = true;
      activeFilters.seo = true;
    });
  } else {
    activeFilters[filter] = !activeFilters[filter];
    el.classList.toggle('active');
  }
  renderAllResults();
}

function copyDomain(btn, domain) {
  navigator.clipboard.writeText(domain);
  btn.textContent='✓';
  btn.classList.add('ok');
  setTimeout(() => {
    btn.textContent='⎘';
    btn.classList.remove('ok');
  }, 1500);
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
window.onload = () => {
  document.getElementById('main-search').value = 'spark';
};
</script>

</body>
</html>
