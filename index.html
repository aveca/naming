<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Domain Finder - Available Only</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{
  background:#080810;
  font-family:'Outfit',sans-serif;
  color:#fff;
  min-height:100vh;
  padding:12px;
  display:flex;
  flex-direction:column;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}

.container{
  flex:1;
  max-width:900px;
  margin:0 auto;
  width:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Header */
.header{margin-bottom:20px;text-align:center}
h1{font-size:9px;letter-spacing:2px;color:#2a2a45;text-transform:uppercase;margin-bottom:4px}
h2{font-size:28px;font-weight:800;background:linear-gradient(135deg,#00e676,#00bcd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;line-height:1.2}
.tagline{font-size:12px;color:#2a2a45}

/* Search Bar */
.search-container{
  display:flex;
  margin-bottom:16px;
  background:#0d0d18;
  padding:12px;
  border-radius:12px;
  border:1px solid #1e1e35;
}

.search-input{
  flex:1;
  background:#111120;
  border:1px solid #1e1e35;
  border-radius:8px;
  color:#fff;
  font-family:'Outfit',sans-serif;
  font-size:16px;
  padding:14px 16px;
  outline:none;
  -webkit-appearance:none;
  transition:border-color 0.15s;
}
.search-input:focus{border-color:#00e67644}
.search-input::placeholder{color:#333355}

/* Results */
.results{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

.domain-card{
  background:#0f0f1e;
  border:1px solid #00e67630;
  background:#071410;
  border-radius:8px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:12px;
  animation:slideIn 0.2s ease forwards;
  opacity:0;
}
@keyframes slideIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

.domain-name{
  flex:1;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  font-weight:600;
  color:#00e676;
  word-break:break-all;
}

.domain-name .ext{
  color:#00e67699;
  font-weight:500;
}

.domain-actions{
  display:flex;
  gap:6px;
  flex-shrink:0;
}

.link-btn{
  text-decoration:none;
  background:linear-gradient(135deg,#00e676,#00bcd4);
  border:none;
  border-radius:6px;
  color:#000;
  padding:6px 12px;
  font-size:9px;
  font-weight:700;
  cursor:pointer;
  transition:opacity 0.1s;
  -webkit-appearance:none;
  -webkit-tap-highlight-color:transparent;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
.link-btn:active{opacity:0.7}

.copy-btn{
  background:transparent;
  border:1px solid #00e67630;
  border-radius:6px;
  color:#00e67699;
  padding:6px 8px;
  font-size:11px;
  cursor:pointer;
  transition:all 0.1s;
  -webkit-appearance:none;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.copy-btn:active{
  color:#00e676;
  border-color:#00e67630;
}
.copy-btn.ok{
  color:#00e676;
}

.empty-state{
  text-align:center;
  padding:40px 20px;
  color:#1a1a28;
  font-size:13px;
  line-height:1.6;
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Status */
.status-bar{
  font-size:10px;
  color:#2a2a45;
  padding:8px 0;
  text-align:center;
  height:20px;
  margin-bottom:8px;
}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{
  display:inline-block;
  width:10px;
  height:10px;
  border:1.5px solid #333355;
  border-top-color:#00e676;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
  vertical-align:middle;
  margin-right:4px;
}

/* Footer */
.footer{
  text-align:center;
  color:#1a1a28;
  font-size:9px;
  margin-top:12px;
  padding-top:8px;
  border-top:1px solid #1a1a30;
}

@media (max-width: 600px) {
  h2{font-size:24px}
  .search-input{font-size:14px}
  .domain-name{font-size:12px}
  .link-btn{padding:5px 10px;font-size:8px}
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>🟢 Domaines Disponibles</h1>
    <h2>Find Available Domains</h2>
    <p class="tagline">Tape un mot-clé</p>
  </div>

  <!-- Search Bar -->
  <div class="search-container">
    <input type="text" id="main-search" class="search-input" placeholder="Cherche un domaine..." oninput="handleSearch()" />
  </div>

  <!-- Status -->
  <div class="status-bar" id="status"></div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="empty-state">👆 Tape un mot-clé pour commencer...</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>Cloudflare DNS • 100% Disponibles • v5.1</p>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// DOMAIN FINDER - v5.1 CLOUDFLARE DIRECT SEARCH
// ════════════════════════════════════════════════════════════════

const TLDS = ['.com','.io','.app','.co','.ai','.dev','.tech','.xyz'];
const PREFIXES = ['get','try','use','my','the','pro','one','top','real'];
const SUFFIXES = ['hq','app','ai','hub','pro','io','ly','fy','base','lab','kit','link','er','ify'];

let searchTimeout;
let allDomains = [];
let availableDomains = [];
let checkingDNS = new Set();

function handleSearch() {
  const keyword = document.getElementById('main-search').value.trim();
  clearTimeout(searchTimeout);
  
  if(keyword.length < 2) {
    document.getElementById('results').innerHTML = '<div class="empty-state">👆 Tape au moins 2 lettres...</div>';
    document.getElementById('status').textContent = '';
    return;
  }
  
  document.getElementById('status').innerHTML = '<span class="spin"></span> Vérification DNS...';
  
  searchTimeout = setTimeout(() => {
    runSearch(keyword);
  }, 300);
}

async function runSearch(keyword) {
  const k = keyword.toLowerCase().replace(/[^a-z0-9]/g,'');
  
  // Generate candidates
  allDomains = generateCandidates(k);
  availableDomains = [];
  checkingDNS.clear();
  
  document.getElementById('results').innerHTML = '<div class="empty-state">🔍 Vérification en cours...</div>';
  
  // Check DNS for ALL
  await checkAllDNS();
  
  // Render only available
  renderAvailable();
}

function generateCandidates(kw) {
  const candidates = [];
  
  // Direct
  TLDS.forEach(t => candidates.push({name: kw, tld: t, domain: kw+t}));
  
  // Prefixes
  PREFIXES.forEach(p => {
    TLDS.slice(0,4).forEach(t => {
      const name = p+kw;
      if(name.length <= 12) candidates.push({name, tld: t, domain: name+t});
    });
  });
  
  // Suffixes
  SUFFIXES.forEach(s => {
    TLDS.slice(0,4).forEach(t => {
      const name = kw+s;
      if(name.length <= 12) candidates.push({name, tld: t, domain: name+t});
    });
  });
  
  // Remove duplicates
  const seen = new Set();
  return candidates.filter(d => {
    if(seen.has(d.domain)) return false;
    seen.add(d.domain);
    return true;
  }).slice(0, 60);
}

async function checkAllDNS() {
  for(const d of allDomains) {
    if(checkingDNS.has(d.domain)) continue;
    checkingDNS.add(d.domain);
    
    try {
      const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${d.domain}&type=A`, {
        headers: {Accept: 'application/dns-json'}
      });
      const data = await res.json();
      
      // Available = NXDOMAIN (status 3) or NODATA (status 0 with no answers)
      d.available = (data.Status === 3 || (data.Status === 0 && (!data.Answer || data.Answer.length === 0)));
      
      if(d.available) {
        availableDomains.push(d);
        renderAvailable();
      }
      
      await new Promise(r => setTimeout(r, 80));
    } catch(e) {
      // Ignore fetch errors, just mark as unknown
    }
  }
}

function renderAvailable() {
  const resultsDiv = document.getElementById('results');
  
  if(availableDomains.length === 0) {
    resultsDiv.innerHTML = '<div class="empty-state">❌ Aucun domaine disponible trouvé</div>';
    document.getElementById('status').textContent = '';
    return;
  }
  
  resultsDiv.innerHTML = '';
  
  availableDomains.forEach((d, idx) => {
    const card = document.createElement('div');
    card.className = 'domain-card';
    card.style.animationDelay = `${idx * 0.02}s`;
    
    // Generate Cloudflare Registrar search URL with domain pre-filled
    const cfUrl = `https://www.cloudflare.com/products/registrar/?query=${d.domain}`;
    
    card.innerHTML = `
      <div class="domain-name">${d.name}<span class="ext">${d.tld}</span></div>
      <div class="domain-actions">
        <a href="${cfUrl}" target="_blank" class="link-btn">🔗 Cloudflare</a>
        <button class="copy-btn" onclick="copyDomain(this,'${d.domain}')">📋</button>
      </div>
    `;
    
    resultsDiv.appendChild(card);
  });
  
  document.getElementById('status').textContent = `✓ ${availableDomains.length} disponible${availableDomains.length>1?'s':''}`;
}

function copyDomain(btn, domain) {
  navigator.clipboard.writeText(domain).then(() => {
    btn.textContent = '✓';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.textContent = '📋';
      btn.classList.remove('ok');
    }, 1500);
  });
}

window.onload = () => {
  document.getElementById('main-search').focus();
};
</script>

</body>
</html>
